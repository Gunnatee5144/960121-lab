<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="author" content="Untree.co">
  <link rel="shortcut icon" href="favicon.png">
  <meta name="description" content="Register a new account" />
  <title>Register | Furni</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .register-shell { min-height: 100vh; background: linear-gradient(135deg, #f7efe3 0%, #ffffff 55%, #e9f3ef 100%); }
    .register-card { border: 0; border-radius: 24px; box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12); overflow: hidden; }
    .register-hero { background: linear-gradient(160deg, #1f3d36 0%, #2f5d50 100%); color: #fff; padding: 3rem; }
    .register-form { padding: 3rem; background: #fff; }
    .password-hint { font-size: 0.95rem; color: #5f6b68; }
    .status-message { min-height: 1.5rem; }
  </style>
</head>
<body>
  <main class="register-shell d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
          <div class="register-card row g-0">
            <div class="col-lg-5 register-hero d-flex flex-column justify-content-between">
              <div>
                <p class="text-uppercase opacity-75 mb-2">Create account</p>
                <h1 class="display-6 fw-bold mb-3">Join the store</h1>
                <p class="mb-0">Use a strong password, then submit the form to save the user in <code>auth_user.json</code>.</p>
              </div>
              <a class="btn btn-light mt-4" href="index.html">Back to home</a>
            </div>
            <div class="col-lg-7 register-form">
              <h2 class="h3 fw-bold mb-3">Register</h2>
              <p class="password-hint mb-4">Password must be at least 8 characters, contain one uppercase letter, and one special character like <strong>!</strong>, <strong>@</strong>, <strong>#</strong>, <strong>$</strong>, <strong>%</strong>, <strong>^</strong>, <strong>&</strong>, or <strong>*</strong>.</p>
              <form id="register-form" novalidate>
                <div class="mb-3">
                  <label for="firstName" class="form-label">Name</label>
                  <input id="firstName" name="firstName" type="text" class="form-control" placeholder="Your name" required>
                </div>
                <div class="mb-3">
                  <label for="username" class="form-label">Email</label>
                  <input id="username" name="username" type="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input id="password" name="password" type="password" class="form-control" placeholder="Create a strong password" required>
                </div>
                <div id="password-feedback" class="small mb-3"></div>
                <div id="register-status" class="status-message mb-3"></div>
                <button type="submit" class="btn btn-primary w-100">Create account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
